services:
  mongodb:
    image: mongo:7
    container_name: mongodb-festivos
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: festivos
    volumes:
      - mongo_data:/data/db
      - ./MongoDB/data:/import-data:ro
      - ./MongoDB/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost --port 27017 -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1 >/dev/null"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  express-api:
    build:
      context: ./ExpressJS
      dockerfile: Dockerfile
    container_name: expressjs-festivos
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/festivos?authSource=admin
      CORS_ORIGIN: http://localhost:4200
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    container_name: postgres-calendario
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: calendar_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  springboot-api:
    build:
      context: ./SpringBootApi/calendario-api
      dockerfile: Dockerfile
    container_name: springboot-calendario
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/calendar
      SPRING_DATASOURCE_USERNAME: calendar_user
      SPRING_DATASOURCE_PASSWORD: calendar_pass
      API_FESTIVOS_URL: http://express-api:3000/festivos/obtener/
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
    ports:
      - "8080:8080"

volumes:
  mongo_data:
  postgres_data:
